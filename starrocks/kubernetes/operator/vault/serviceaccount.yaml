# ServiceAccount and RBAC for StarRocks pods
#
# Architecture reference: starrocks/kubernetes/starrocks-architecture.md §7.3
#
# The Vault Agent Injector webhook adds an init container to FE and CN pods that
# authenticates to HashiCorp Vault using the Kubernetes auth method. The init
# container presents this ServiceAccount's JWT token to Vault, which validates it
# against the Kubernetes TokenReview API and issues a Vault token bound to the
# "starrocks" role.
#
# ─── Vault-side setup (run once before deploying StarRocks pods) ───────────────
#
# 1. Enable the Kubernetes auth method (if not already enabled):
#      vault auth enable kubernetes
#
# 2. Configure it to point at the cluster API:
#      vault write auth/kubernetes/config \
#        kubernetes_host="https://kubernetes.default.svc" \
#        token_reviewer_jwt="$(kubectl -n starrocks create token starrocks)" \
#        kubernetes_ca_cert=@/path/to/ca.crt
#
# 3. Create the Vault policy (see vault/vault-policy.hcl):
#      vault policy write starrocks vault/vault-policy.hcl
#
# 4. Bind the policy to this ServiceAccount:
#      vault write auth/kubernetes/role/starrocks \
#        bound_service_account_names=starrocks \
#        bound_service_account_namespaces=starrocks \
#        policies=starrocks \
#        ttl=1h

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: starrocks
  namespace: starrocks
  labels:
    app.kubernetes.io/part-of: starrocks-production

---
# Minimal Role for StarRocks pods.
# The serviceaccounts/token resource is required for the Vault Agent init container
# to obtain a projected service account token with a short TTL for Vault auth.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: starrocks
  namespace: starrocks
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs:     ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: starrocks
  namespace: starrocks
subjects:
  - kind:      ServiceAccount
    name:      starrocks
    namespace: starrocks
roleRef:
  kind:     Role
  name:     starrocks
  apiGroup: rbac.authorization.k8s.io
