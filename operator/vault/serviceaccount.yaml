# ServiceAccount and RBAC for ClickHouse pods
#
# Architecture reference: docs/architecture.md §7.4
#
# The Vault Agent Injector webhook adds an init container to CH pods that
# authenticates to HashiCorp Vault using the Kubernetes auth method. The init
# container presents this ServiceAccount's JWT token to Vault, which validates it
# against the Kubernetes TokenReview API and issues a Vault token bound to the
# "clickhouse-cache" role.
#
# ─── Vault-side setup (run once before deploying CH pods) ─────────────────────
#
# 1. Enable the Kubernetes auth method (if not already enabled):
#      vault auth enable kubernetes
#
# 2. Configure it to point at the cluster API:
#      vault write auth/kubernetes/config \
#        kubernetes_host="https://kubernetes.default.svc" \
#        token_reviewer_jwt="$(kubectl -n clickhouse create token clickhouse)" \
#        kubernetes_ca_cert=@/path/to/ca.crt
#
# 3. Create the Vault policy (see vault/vault-policy.hcl):
#      vault policy write clickhouse-cache vault/vault-policy.hcl
#
# 4. Bind the policy to this ServiceAccount:
#      vault write auth/kubernetes/role/clickhouse-cache \
#        bound_service_account_names=clickhouse \
#        bound_service_account_namespaces=clickhouse \
#        policies=clickhouse-cache \
#        ttl=1h
#
# Note on separation: a single ServiceAccount "clickhouse" is used for all CH pods.
# If stricter secret isolation is required (e.g., ingest pods must not access S3
# credentials for the cache cluster), create separate ServiceAccounts per cluster
# (clickhouse-cache, clickhouse-ingest) with separate Vault roles and policies,
# and reference them in the respective pod templates in 02-chi.yaml.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clickhouse
  namespace: clickhouse
  labels:
    app.kubernetes.io/part-of: clickhouse-production

---
# Minimal Role for ClickHouse pods.
# The serviceaccounts/token resource is required for the Vault Agent init container
# to obtain a projected service account token with a short TTL for Vault auth.
# (The legacy /var/run/secrets/... token works too, but projected tokens are preferred.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clickhouse
  namespace: clickhouse
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs:     ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clickhouse
  namespace: clickhouse
subjects:
  - kind:      ServiceAccount
    name:      clickhouse
    namespace: clickhouse
roleRef:
  kind:     Role
  name:     clickhouse
  apiGroup: rbac.authorization.k8s.io
